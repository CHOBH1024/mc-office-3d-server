<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft Metaverse Office 3D</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading">
    <div id="ld-title">META OFFICE</div>
    <div id="ld-bar"><div id="ld-fill"></div></div>
    <div id="ld-sub">에셋 로딩 중...</div>
  </div>

  <!-- Crosshair -->
  <div id="xhair" style="display:none;"></div>

  <!-- Login UI -->
  <div id="login-ui" class="mc-panel" style="display:none;">
    <h1>메타버스 오피스</h1>
    <div class="sub">닉네임과 컬러를 선택하세요</div>
    <input type="text" id="login-name" placeholder="닉네임 (최대 8자)" maxlength="8" autocomplete="off">
    <div class="color-row" id="color-row"></div>
    <button id="login-btn" class="mc-btn primary" style="width:100%; margin-top:8px;">접속하기</button>
  </div>

  <!-- HUD -->
  <div id="hud" style="display:none;">
    <div id="topbar" class="mc-panel">
      <div class="dot" id="net-dot"></div>
      <span id="room-lbl">오픈 오피스</span>
      <span style="color:#666;">|</span>
      <span id="ucnt">1명 접속</span>
    </div>

    <div id="mm-wrap" class="mc-panel">
      <div id="mm-title">MAP</div>
      <canvas id="mm" width="148" height="148"></canvas>
    </div>

    <div id="vpanel" class="mc-panel">
      <div id="vpanel-title">접속자 목록</div>
      <div id="vpanel-list"></div>
    </div>

    <div id="chat-wrap" class="mc-panel">
      <div id="chat-log"></div>
      <div id="chat-row">
        <input type="text" id="chat-in" placeholder="채팅 입력 (Enter)" autocomplete="off">
        <button id="send-btn" class="mc-btn">전송</button>
      </div>
    </div>

    <div id="coords">X: <b id="cx">0</b> Y: <b id="cy">0</b> Z: <b id="cz">0</b></div>

    <div id="hotbar" class="mc-panel">
      <span class="hb-hint">WASD·Space점프·Shift달리기·F날기·V1인칭 · 1~0 블록(클릭으로 더) · 우클릭설치/좌클릭파괴 · T채팅 · N낮밤 · R비 · Y불꽃 · B음악 · M음소거</span>
      <button class="mc-btn" id="btn-mic">🎤 마이크</button>
      <button class="mc-btn" id="btn-cam">📷 카메라</button>
      <button class="mc-btn" id="btn-share">💻 화면공유</button>
      <button class="mc-btn" id="btn-board">✏️ 화이트보드</button>
      <button class="mc-btn" id="btn-view">🔭 1인칭</button>
      <button class="mc-btn red" id="btn-exit">🚪 나가기</button>
    </div>
  </div>

  <div id="room-pop"></div>
  <div id="toast-wrap"></div>

  <!-- Screen Share Modal -->
  <div id="screen-share-ui" class="glass-modal" style="display:none;">
    <div class="modal-header">
      <div><span class="pulse-dot"></span> <span style="font-weight:bold;">화면 공유 시청 중</span></div>
      <button id="close-screen" class="mc-btn red">닫기 ✕</button>
    </div>
    <video id="screen-share-vid" autoplay playsinline></video>
  </div>

  <!-- Whiteboard Modal -->
  <div id="board-ui" class="glass-modal" style="display:none;">
    <div class="modal-header">
      <span style="font-weight:bold;">✏️ 실시간 2D 화이트보드</span>
      <div class="board-tools" id="board-tools">
        <div class="board-color sel" style="background:#000;"></div>
        <div class="board-color" style="background:#f44336;"></div>
        <div class="board-color" style="background:#2196f3;"></div>
        <div class="board-color" style="background:#4caf50;"></div>
      </div>
      <button id="close-board" class="mc-btn red">닫기 ✕</button>
    </div>
    <div class="canvas-container">
      <canvas id="board-canvas"></canvas>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<script src="app.js"></script>
</body>
</html>
