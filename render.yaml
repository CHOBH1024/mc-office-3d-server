# Render Blueprint — mc-office (socket.io 메타버스 오피스 서버 + 클라이언트)
# Render 대시보드에서 "New > Blueprint" 후 이 저장소 연결하면 자동 배포됩니다.
services:
  - type: web
    name: mc-office
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
